<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felizes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Verdana, sans-serif;
}

body{
background:#f8f5ef;
}

 
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.logo{
font-size:28px;
color:#ff4d6d;
font-weight:bold;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
color:#555;
}

.nav-btns button{
padding:8px 18px;
border-radius:20px;
border:1px solid #ff4d6d;
background:transparent;
color:#ff4d6d;
cursor:pointer;
margin-left:10px;
}

.register{
background:#ff4d6d;
color:white;
}
 
.hero{
height:90vh;
background:linear-gradient(rgba(255,255,255,0.3),rgba(255,255,255,0.4)),
url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') center/cover;
display:flex;
align-items:center;
padding:0 80px;
}

.content{
max-width:600px;
}

.content h1{
font-size:48px;
color:#ff4d6d;
margin-bottom:20px;
}

.content p{
font-size:20px;
color:#444;
margin-bottom:30px;
}

.options button{
display:block;
margin-bottom:15px;
padding:12px 25px;
border-radius:25px;
border:2px solid #ff4d6d;
background:white;
color:#ff4d6d;
cursor:pointer;
width:250px;
}
</style>
</head>

<body>

<nav>
<div class="logo">TLP</div>

 

<div class="nav-btns">
<button class="register">TRIMESTRES</button>
</div>
</nav>

<section class="hero">
<div class="content">
<h1>Encontros aqui as minhas tarefas de Programação</h1>
<p>Abaixo temos as páginas de cada trimestre onde consta os links das tarefas</p>

<div class="options">
<button><a href="pag/trimestre1.html">1º Trimestre</a></button>
<button><a href="pag/trimestre2.html">2º Trimestre</a></button>
<button><a href="pag/trimestre3.html">3º Trimestre</a></button>
</div>
</div>
</section>

</body>
</html>
